name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --bundles nsis
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: ""
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxcb1-dev libxcb-xfixes0-dev

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: TrayClip ${{ github.ref_name }}
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} ${{ matrix.args }}

      - name: Remove unwanted Linux bundle files
        if: matrix.platform == 'ubuntu-22.04'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/${{ github.ref_name }} --jq '.id') || exit 0
          gh api repos/${{ github.repository }}/releases/$RELEASE_ID/assets --paginate --jq '.[] | "\(.id) \(.name)"' | while read id name; do
            case "$name" in
              *.AppImage|*.deb|*.rpm|*.exe|*.dmg|*.AppImage.tar.gz|*.AppImage.zsync)
                echo "KEEP: $name"
                ;;
              *)
                echo "DELETE: $name"
                gh api -X DELETE repos/${{ github.repository }}/releases/assets/$id || true
                ;;
            esac
          done
        shell: bash

  generate-latest-json:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"
          RELEASE_ID=$(gh api repos/$REPO/releases/tags/$TAG --jq '.id')

          # Create temp dir for .sig files
          SIG_DIR=$(mktemp -d)

          # Fetch all asset names from the release
          ASSETS=$(gh api repos/$REPO/releases/$RELEASE_ID/assets --paginate --jq '.[].name')

          # Helper: download a .sig file and return its content (trimmed)
          get_sig() {
            local asset_name="$1"
            local sig_file="${SIG_DIR}/${asset_name}.sig"
            gh release download "$TAG" --repo "$REPO" --pattern "${asset_name}.sig" --output "$sig_file" 2>/dev/null || true
            if [ -f "$sig_file" ]; then
              cat "$sig_file" | tr -d '\n'
            else
              echo ""
            fi
          }

          # Build platforms map dynamically based on what was actually uploaded
          PLATFORMS="{}"
          for asset in $ASSETS; do
            case "$asset" in
              *-setup.exe)
                SIG=$(get_sig "$asset")
                PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "https://github.com/$REPO/releases/download/$TAG/$asset" --arg sig "$SIG" \
                  '. + {"windows-x86_64": {"signature": $sig, "url": $url}}')
                ;;
              *-aarch64.dmg|*_aarch64.dmg|*aarch64*.dmg)
                SIG=$(get_sig "$asset")
                PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "https://github.com/$REPO/releases/download/$TAG/$asset" --arg sig "$SIG" \
                  '. + {"darwin-aarch64": {"signature": $sig, "url": $url}}')
                ;;
              *-x64.dmg|*_x64.dmg|*x86_64*.dmg)
                SIG=$(get_sig "$asset")
                PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "https://github.com/$REPO/releases/download/$TAG/$asset" --arg sig "$SIG" \
                  '. + {"darwin-x86_64": {"signature": $sig, "url": $url}}')
                ;;
              *.AppImage.tar.gz|*.AppImage.zsync|*.sig)
                # skip these
                ;;
              *amd64*.AppImage|*x86_64*.AppImage)
                SIG=$(get_sig "$asset")
                PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "https://github.com/$REPO/releases/download/$TAG/$asset" --arg sig "$SIG" \
                  '. + {"linux-x86_64": {"signature": $sig, "url": $url}}')
                ;;
            esac
          done

          rm -rf "$SIG_DIR"

          BODY=$(gh api repos/$REPO/releases/$RELEASE_ID --jq '.body // ""')

          jq -n \
            --arg version "$VERSION" \
            --arg notes "$BODY" \
            --argjson platforms "$PLATFORMS" \
            '{
              version: $version,
              notes: $notes,
              pub_date: (now | todate),
              platforms: $platforms
            }' > latest.json

          echo "Generated latest.json:"
          cat latest.json

          # Upload latest.json to the release
          gh release upload "$TAG" latest.json --repo "$REPO" --clobber
