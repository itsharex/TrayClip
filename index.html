<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrayClip</title>
  </head>
  <body>
    <div id="root">
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px;animation:fadein 0.3s ease">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" style="animation:spin 0.8s linear infinite">
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
        </svg>
        <span style="font-size:13px;color:#999;font-family:'Segoe UI','PingFang SC',sans-serif">TrayClip</span>
        <span style="font-size:12px;color:#bbb;font-family:'Segoe UI','PingFang SC',sans-serif;margin-top:4px">Loading...</span>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}@keyframes fadein{from{opacity:0}to{opacity:1}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
